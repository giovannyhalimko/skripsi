# Paths
output_root: "./outputs"

# Frame extraction
frame_sampling_fps: 5
max_frames_per_video: 50
image_size: 224

# Training
batch_size: 16
num_workers: 2
lr: 1.0e-4
weight_decay: 1.0e-4
epochs: 30                 # Max epochs — early stopping handles actual duration
early_stop_patience: 5     # Stop if val AUC doesn't improve for this many consecutive epochs
accum_steps: 2             # Gradient accumulation for all models
label_smoothing: 0.02      # Reduced from 0.05 — less signal suppression at small n
fusion_mode: two_branch
n_seeds: 3

# Frequency branch
freq_depth: 5              # FreqCNN conv blocks: 3 (~130K params) or 5 (~700K params)
freq_base_channels: 32     # Channels in first conv block
fft_noise_sigma: 0.05      # Gaussian noise sigma for FFT augmentation (0 to disable)

# Dataset roots
datasets:
  ffpp:
    root: "./dataset/face_forensics"
    real_keywords: ["original", "real", "pristine", "actors", "youtube"]
    fake_keywords: ["fake", "manipulated", "deepfakes", "faceswap", "neuraltextures", "deepfakedetection", "faceshifter", "face2face"]
  cdf:
    root: "./dataset/celeb_df"
    real_keywords: ["real", "authentic"]
    fake_keywords: ["fake", "synthesis", "deepfake"]

