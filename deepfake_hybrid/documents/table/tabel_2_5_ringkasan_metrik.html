<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
table { border-collapse: collapse; width: 100%; font-family: 'Times New Roman', serif; font-size: 12pt; }
th, td { border: 1px solid black; padding: 6px 10px; text-align: center; vertical-align: middle; }
th { font-weight: bold; }
caption { caption-side: bottom; text-align: left; font-size: 11pt; padding-top: 6px; }
</style></head><body>
<table>
  <thead>
    <tr>
      <th>Metrik</th>
      <th>Rumus</th>
      <th>Hasil</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><i>Accuracy</i></td>
      <td>(TP + TN) / (TP + TN + FP + FN)</td>
      <td>85%</td>
    </tr>
    <tr>
      <td><i>Precision</i></td>
      <td>TP / (TP + FP)</td>
      <td>90%</td>
    </tr>
    <tr>
      <td><i>Recall</i></td>
      <td>TP / (TP + FN)</td>
      <td>81.8%</td>
    </tr>
    <tr>
      <td><i>F1-Score</i></td>
      <td>2 &times; (Precision &times; Recall) / (Precision + Recall)</td>
      <td>85.7%</td>
    </tr>
  </tbody>
  <caption>Tabel 2.5 Ringkasan Hasil Perhitungan Metrik</caption>
</table>
</body></html>
